<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GanbaruAI</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup-page">
    <main class="popup-panel">
      <div class="popup-header">
        <div class="mark">G</div>
        <div>
          <h1>GanbaruAI</h1>
          <p id="connection" class="muted">Checking connection</p>
        </div>
      </div>
      <dl>
        <div>
          <dt>Mode</dt>
          <dd id="mode">Inactive</dd>
        </div>
        <div>
          <dt>Remaining</dt>
          <dd id="remaining">-</dd>
        </div>
        <div>
          <dt>Last blocked</dt>
          <dd id="last-blocked">-</dd>
        </div>
      </dl>
      <p id="reason" class="muted"></p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
