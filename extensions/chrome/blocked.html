<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blocked during focus</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="blocked-page">
    <main class="blocked-panel">
      <div class="mark">G</div>
      <h1>Blocked during focus</h1>
      <p id="host" class="host"></p>
      <p id="rule" class="muted"></p>
      <p id="remaining" class="muted"></p>
      <div class="actions">
        <button id="back" type="button">Back</button>
        <button id="allow" type="button">Allow 5 min</button>
        <button id="close" type="button">Close tab</button>
      </div>
    </main>
    <script src="blocked.js" type="module"></script>
  </body>
</html>
