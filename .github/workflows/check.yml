name: check

on:
  pull_request:
    branches:
      - main
      - dev
  merge_group:
    types:
      - checks_requested

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  linux:
    name: linux validation
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: enable pnpm
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: install workspace dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: fetch Rust dependencies
        run: cargo fetch --locked

      - name: check workspace
        run: pnpm -w run check

  windows-rust:
    name: windows Rust check
    runs-on: windows-2022
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: fetch Rust dependencies
        run: cargo fetch --locked

      - name: check Windows Rust
        run: cargo check -p ganbaru-ai --locked
